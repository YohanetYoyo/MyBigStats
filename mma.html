<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyBigStats - MMA</title>
    <script type="module" src="dist/pages/mma.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="notifications" class="notifications"></div>

<header class="site-header">
    <h1>MyBigStats</h1>
    <nav class="sport-nav">
        <a href="index.html">Accueil</a>
        <a href="basket.html">Basket</a>
        <a href="mma.html" class="active">MMA</a>
    </nav>
</header>
<main>
    <section class="toolbar hidden">
        <input id="search-input" type="text" placeholder="Rechercher un combattant..." aria-label="Recherche d'athlète">
        <select id="weightclass-filter" aria-label="Filtrer par catégorie de poids">
            <option value="">Toutes les catégories</option>
        </select>
    </section>

    <nav class="tabs" role="tablist">
        <button class="tab-btn active" data-tab="stats" role="tab">Stats</button>
        <button class="tab-btn" data-tab="historique" role="tab">Historique</button>
        <button class="tab-btn" data-tab="combattants" role="tab">Combattants</button>
        <button class="tab-btn" data-tab="comparateur" role="tab">Comparateur</button>
    </nav>

    <section id="tab-stats" class="tab-panel" data-tab-panel="stats">
        <h2>Statistiques MMA</h2>
        <div id="stats-content">Chargement...</div>
    </section>

    <section id="tab-historique" class="tab-panel hidden" data-tab-panel="historique">
        <h2>Historique des combats</h2>
        <ul id="rencontres-list">Chargement...</ul>
    </section>

    <section id="tab-combattants" class="tab-panel hidden" data-tab-panel="combattants">
        <h2>Combattants</h2>
        <div id="athletes-list" class="athlete-grid">Chargement...</div>
    </section>

    <section id="tab-comparateur" class="tab-panel hidden" data-tab-panel="comparateur">
        <h2>Comparer deux combattants</h2>
        <div class="comparator">
            <select id="compare-athlete-1" aria-label="Premier athlète"></select>
            <span>VS</span>
            <select id="compare-athlete-2" aria-label="Deuxième athlète"></select>
            <button id="compare-btn">Comparer</button>
        </div>
        <div id="compare-result"></div>
    </section>

</main>
</body>
</html>
